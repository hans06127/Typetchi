<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Typetchi</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <main class="popup">
    <header class="hero">
      <p class="eyebrow">Typetchi status</p>
      <h1>Typetchi</h1>
      <p id="status" class="status">讀取狀態中...</p>
    </header>
    <section class="card" aria-label="目前狀態">
      <div><span>Level / Stage</span><strong id="levelStage">—</strong></div>
      <div><span>今日輸入</span><strong id="todayTyped">—</strong></div>
      <div><span>今日任務</span><strong id="missions">—</strong></div>
    </section>
    <button id="showTypetchi" type="button">顯示 Typetchi</button>
  </main>
  <script src="popup.js"></script>
</body>
</html>
